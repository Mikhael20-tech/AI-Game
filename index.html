<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Kuis Gerak AI</title>
    <!-- Menautkan ke file style.css yang sama agar temanya seragam -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS tambahan khusus untuk halaman Beranda */
        #home-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 30px var(--card-glow);
            z-index: 1;
            animation: fadeIn 0.5s ease-out;
        }

        .home-icon {
            font-size: 75px;
            margin-bottom: 25px;
            display: inline-block;
            animation: float 4s infinite ease-in-out alternate;
        }

        .home-title {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .home-desc {
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 16px;
        }

        .home-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Style untuk tombol panduan agar terlihat outline */
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(139, 92, 246, 0.5);
            color: var(--text-primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="home-container">
        <div class="home-icon">🤖</div>
        <h1 class="home-title">KUIS GERAK AI</h1>
        <p class="home-desc">Game edukasi interaktif berbasis kecerdasan buatan. Uji pengetahuanmu secara sehat dengan menggerakkan tubuh untuk menjawab kuis!</p>
        
        <div class="home-btn-group">
            <!-- Navigasi langsung ke file kuis utama -->
            <button onclick="window.location.href='kuis.html'">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                MULAI BERMAIN
            </button>
            
            <!-- Navigasi ke halaman panduan terpisah -->
            <button class="btn-outline" onclick="window.location.href='guide.html'">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                BACA PANDUAN
            </button>
        </div>
    </div>
</body>
</html>
